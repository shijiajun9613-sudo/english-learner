<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Learner - 英语学习助手</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- App Container -->
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <h1 class="app-title">📚 English Learner</h1>
      <span class="streak-badge" id="headerStreak" title="连续学习天数">🔥 0</span>
    </header>

    <!-- Main Content Area -->
    <main id="mainContent" class="main-content">
      <!-- Content rendered dynamically by JS -->
    </main>

    <!-- Bottom Tab Bar -->
    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="vocab">
        <span class="tab-icon">📖</span>
        <span class="tab-label">学习</span>
      </button>
      <button class="tab-btn" data-tab="quiz">
        <span class="tab-icon">✍️</span>
        <span class="tab-label">测验</span>
      </button>
      <button class="tab-btn" data-tab="checkin">
        <span class="tab-icon">📅</span>
        <span class="tab-label">打卡</span>
      </button>
      <button class="tab-btn" data-tab="stats">
        <span class="tab-icon">📊</span>
        <span class="tab-label">统计</span>
      </button>
    </nav>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Confetti Canvas -->
  <canvas id="confettiCanvas" class="confetti-canvas"></canvas>

  <!-- Scripts -->
  <script src="bundle.js"></script>
</body>
</html>
